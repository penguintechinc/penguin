---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: project-template-beta

namespace: project-template-beta

namePrefix: beta-

commonLabels:
  environment: beta

bases:
- ../../base

replicas:
- name: flask-backend
  count: 2
- name: go-backend
  count: 2
- name: webui
  count: 2

images:
- name: registry-dal2.penguintech.io/project-template/flask-backend
  newTag: latest
- name: registry-dal2.penguintech.io/project-template/go-backend
  newTag: latest
- name: registry-dal2.penguintech.io/project-template/webui
  newTag: latest

configMapGenerator:
- name: project-template-config
  behavior: merge
  literals:
  - LOG_LEVEL=INFO
  - RELEASE_MODE=false
