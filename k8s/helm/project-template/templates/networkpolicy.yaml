{{- if .Values.networkPolicy.enabled }}
# Network Policy for Flask Backend
{{- if .Values.flaskBackend.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "project-template.flaskBackend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "project-template.flaskBackend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "project-template.flaskBackend.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
  ingress:
  # Allow from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: {{ .Values.flaskBackend.service.port }}
  # Allow from webui
  - from:
    - podSelector:
        matchLabels:
          {{- include "project-template.webui.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.flaskBackend.service.port }}
    - protocol: TCP
      port: {{ .Values.flaskBackend.service.grpcPort }}
  egress:
  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow external traffic (license server, etc)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
{{- end }}

