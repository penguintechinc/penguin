{{- if .Values.goBackend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "project-template.goBackend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "project-template.goBackend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.goBackend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "project-template.goBackend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "project-template.goBackend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "project-template.serviceAccountName" . }}
      securityContext:
        {{- if .Values.goBackend.privileged }}
        {}
        {{- else }}
        {{- toYaml .Values.goBackend.securityContext | nindent 8 }}
        {{- end }}
      containers:
      - name: go-backend
        image: "{{ .Values.goBackend.image.repository }}:{{ .Values.goBackend.image.tag }}"
        imagePullPolicy: {{ .Values.goBackend.image.pullPolicy }}
        {{- if .Values.goBackend.privileged }}
        securityContext:
          {{- toYaml .Values.goBackend.securityContext | nindent 10 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.goBackend.service.port }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.goBackend.service.grpcPort }}
          protocol: TCP
        env:
        {{- toYaml .Values.goBackend.env | nindent 8 }}
        envFrom:
        {{- toYaml .Values.goBackend.envFrom | nindent 8 }}
        livenessProbe:
          {{- toYaml .Values.goBackend.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.goBackend.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.goBackend.resources | nindent 10 }}
        {{- with .Values.goBackend.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.goBackend.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "project-template.goBackend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "project-template.goBackend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.goBackend.service.type }}
  ports:
  - port: {{ .Values.goBackend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: {{ .Values.goBackend.service.grpcPort }}
    targetPort: grpc
    protocol: TCP
    name: grpc
  selector:
    {{- include "project-template.goBackend.selectorLabels" . | nindent 4 }}
{{- end }}
