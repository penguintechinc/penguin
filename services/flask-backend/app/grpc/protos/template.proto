syntax = "proto3";

package template.v1;

option go_package = "github.com/penguintechinc/project-template/services/go-backend/internal/grpc/protos;protos";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// AuthService provides authentication and token validation
service AuthService {
  rpc ValidateToken(TokenRequest) returns (TokenResponse);
  rpc GetUser(UserRequest) returns (UserResponse);
}

// TeamService provides team management operations
service TeamService {
  rpc GetTeam(TeamRequest) returns (TeamResponse);
  rpc ListUserTeams(UserRequest) returns (TeamListResponse);
}

// Health service (standard gRPC health check)
service Health {
  rpc Check(google.protobuf.Empty) returns (HealthCheckResponse);
  rpc Watch(google.protobuf.Empty) returns (stream HealthCheckResponse);
}

// AuthService messages
message TokenRequest {
  string token = 1;
}

message TokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
  repeated string team_ids = 4;
  string current_team_id = 5;
  google.protobuf.Timestamp exp = 6;
  string error = 7;
}

message UserRequest {
  string user_id = 1;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string role = 4;
  repeated string team_ids = 5;
  google.protobuf.Timestamp created_at = 6;
  string error = 7;
}

// TeamService messages
message TeamRequest {
  string team_id = 1;
}

message TeamResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string owner_id = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string error = 9;
}

message TeamListResponse {
  repeated TeamResponse teams = 1;
  int32 total = 2;
  string error = 3;
}

// Health check messages
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
}
